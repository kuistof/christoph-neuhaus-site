<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Board — April 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --surface-2: #1a1a22;
    --border: #2a2a35;
    --text: #e8e8ef;
    --text-muted: #6b6b7b;
    --accent: #00e676;
    --accent-dim: rgba(0,230,118,0.08);
    --accent-glow: rgba(0,230,118,0.25);
    --red: #ff5252;
    --orange: #ffab40;
    --gold: #ffd740;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .header__label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .header__title {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header__target {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .header__target span {
    color: var(--accent);
  }

  /* COUNTDOWN */
  .countdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 48px;
  }

  .countdown__block {
    text-align: center;
  }

  .countdown__value {
    font-family: 'Space Mono', monospace;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    min-width: 72px;
    display: block;
  }

  .countdown__label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .countdown__sep {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 4vw, 44px);
    color: var(--border);
    align-self: flex-start;
    padding-top: 4px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0.2; }
  }

  /* PROGRESS BAR */
  .progress-section {
    margin-bottom: 48px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .progress-header__amount {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    color: var(--accent);
  }

  .progress-header__pct {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--text-muted);
  }

  .progress-bar {
    width: 100%;
    height: 28px;
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }

  .progress-bar__fill {
    height: 100%;
    background: linear-gradient(90deg, #00c853, #00e676, #69f0ae);
    border-radius: 14px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    min-width: 0;
  }

  .progress-bar__fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
    border-radius: 14px;
  }

  .progress-bar__markers {
    position: absolute;
    inset: 0;
    display: flex;
    pointer-events: none;
  }

  .progress-bar__marker {
    width: 1px;
    height: 100%;
    background: rgba(255,255,255,0.06);
  }

  /* PROJECT INPUT */
  .add-project {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 48px;
  }

  .add-project__title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .add-project__row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .add-project__input {
    flex: 1;
    min-width: 160px;
    padding: 12px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-project__input:focus {
    border-color: var(--accent);
  }

  .add-project__input::placeholder {
    color: var(--text-muted);
  }

  .add-project__input--amount {
    max-width: 180px;
    font-family: 'Space Mono', monospace;
  }

  .add-project__btn {
    padding: 12px 28px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .add-project__btn:hover {
    background: #00ff88;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* PROJECTS LIST */
  .projects {
    margin-bottom: 48px;
  }

  .projects__title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .projects__empty {
    color: var(--text-muted);
    font-style: italic;
    font-size: 14px;
    padding: 16px 0;
  }

  .project-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }

  .project-card:hover {
    border-color: var(--accent-glow);
  }

  .project-card__name {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
  }

  .project-card__amount {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--accent);
    margin-left: 16px;
    white-space: nowrap;
  }

  .project-card__delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    margin-left: 16px;
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
    line-height: 1;
  }

  .project-card__delete:hover {
    color: var(--red);
    background: rgba(255,82,82,0.1);
  }

  /* CHECKBOXES GRID */
  .checks-section {
    margin-bottom: 48px;
  }

  .checks-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }

  .checks-header__title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .checks-header__count {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text-muted);
  }

  .checks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 6px;
  }

  .check-box {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-box:hover {
    border-color: var(--accent);
    transform: scale(1.08);
  }

  .check-box--auto {
    background: var(--accent-dim);
    border-color: rgba(0,230,118,0.3);
  }

  .check-box--auto::after {
    content: '';
    width: 50%;
    height: 50%;
    background: var(--accent);
    border-radius: 3px;
    opacity: 0.6;
  }

  .check-box--manual {
    background: var(--accent-dim);
    border-color: rgba(0,230,118,0.3);
  }

  .check-box--manual::after {
    content: '✓';
    color: var(--accent);
    font-size: 16px;
    font-weight: 700;
  }

  /* STATS ROW */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .stat-card__value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card__label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* STATUS INDICATOR */
  .status {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status__dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status--offline .status__dot {
    background: var(--red);
    animation: none;
  }

  /* VELOCITY INDICATOR */
  .velocity {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    margin-top: -8px;
    margin-bottom: 32px;
  }

  .velocity span {
    color: var(--orange);
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    .countdown { gap: 12px; }
    .add-project__row { flex-direction: column; }
    .add-project__input--amount { max-width: 100%; }
    .checks-grid { grid-template-columns: repeat(10, 1fr); gap: 4px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <div class="header__label">Revenue Tracker</div>
    <h1 class="header__title">Momentum Board</h1>
    <div class="header__target">Ziel April 2026: <span>€100.000</span></div>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown">
    <div class="countdown__block">
      <span class="countdown__value" id="cd-days">--</span>
      <div class="countdown__label">Tage</div>
    </div>
    <span class="countdown__sep">:</span>
    <div class="countdown__block">
      <span class="countdown__value" id="cd-hours">--</span>
      <div class="countdown__label">Stunden</div>
    </div>
    <span class="countdown__sep">:</span>
    <div class="countdown__block">
      <span class="countdown__value" id="cd-mins">--</span>
      <div class="countdown__label">Minuten</div>
    </div>
    <span class="countdown__sep">:</span>
    <div class="countdown__block">
      <span class="countdown__value" id="cd-secs">--</span>
      <div class="countdown__label">Sekunden</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-header__amount" id="total-amount">€0</div>
      <div class="progress-header__pct" id="total-pct">0%</div>
    </div>
    <div class="progress-bar">
      <div class="progress-bar__fill" id="progress-fill" style="width:0%"></div>
      <div class="progress-bar__markers" id="progress-markers"></div>
    </div>
  </div>

  <div class="velocity" id="velocity"></div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-card__value" id="stat-projects">0</div>
      <div class="stat-card__label">Projekte</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="stat-avg">€0</div>
      <div class="stat-card__label">Ø Volumen</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="stat-remaining">€100.000</div>
      <div class="stat-card__label">Verbleibend</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="stat-daily">€0</div>
      <div class="stat-card__label">€/Tag nötig</div>
    </div>
  </div>

  <!-- ADD PROJECT -->
  <div class="add-project">
    <div class="add-project__title">+ Projekt eintragen</div>
    <div class="add-project__row">
      <input type="text" class="add-project__input" id="input-name" placeholder="Projektname / Kunde">
      <input type="number" class="add-project__input add-project__input--amount" id="input-amount" placeholder="Volumen €" min="0" step="100">
      <button class="add-project__btn" id="btn-add" onclick="addProject()">Eintragen</button>
    </div>
  </div>

  <!-- PROJECTS LIST -->
  <div class="projects">
    <div class="projects__title">Projekte</div>
    <div id="projects-list">
      <div class="projects__empty">Noch keine Projekte eingetragen.</div>
    </div>
  </div>

  <!-- CHECKBOXES -->
  <div class="checks-section">
    <div class="checks-header">
      <div class="checks-header__title">100 × €1.000 Kästchen</div>
      <div class="checks-header__count" id="checks-count">0 / 100</div>
    </div>
    <div class="checks-grid" id="checks-grid"></div>
  </div>
</div>

<!-- STATUS -->
<div class="status" id="status">
  <div class="status__dot"></div>
  <span>LIVE SYNC</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase Init ──
const app = initializeApp({
  apiKey: "AIzaSyAYlkFOaHcUEm20xiJ4EghMoOrDvslOuAc",
  authDomain: "momentum-board-7207e.firebaseapp.com",
  databaseURL: "https://momentum-board-7207e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "momentum-board-7207e",
  storageBucket: "momentum-board-7207e.firebasestorage.app",
  messagingSenderId: "1177515175",
  appId: "1:1177515175:web:e2cd640252003c13c19782"
});

const db = getDatabase(app);
const TARGET = 100000;
const BOXES = 100;

// ── State ──
let projects = {};
let manualChecks = {};

// ── Countdown ──
function updateCountdown() {
  const end = new Date('2026-05-01T00:00:00+02:00');
  const now = new Date();
  let diff = end - now;

  if (diff <= 0) {
    document.getElementById('cd-days').textContent = '00';
    document.getElementById('cd-hours').textContent = '00';
    document.getElementById('cd-mins').textContent = '00';
    document.getElementById('cd-secs').textContent = '00';
    return;
  }

  const days = Math.floor(diff / 86400000);
  diff %= 86400000;
  const hours = Math.floor(diff / 3600000);
  diff %= 3600000;
  const mins = Math.floor(diff / 60000);
  diff %= 60000;
  const secs = Math.floor(diff / 1000);

  document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
  document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
}

setInterval(updateCountdown, 1000);
updateCountdown();

// ── Progress Markers ──
(function initMarkers() {
  const container = document.getElementById('progress-markers');
  for (let i = 1; i < 10; i++) {
    const m = document.createElement('div');
    m.className = 'progress-bar__marker';
    m.style.position = 'absolute';
    m.style.left = (i * 10) + '%';
    container.appendChild(m);
  }
})();

// ── Checkbox Grid ──
function initGrid() {
  const grid = document.getElementById('checks-grid');
  grid.innerHTML = '';
  for (let i = 0; i < BOXES; i++) {
    const box = document.createElement('div');
    box.className = 'check-box';
    box.dataset.index = i;
    box.onclick = () => toggleManualCheck(i);
    grid.appendChild(box);
  }
}
initGrid();

// ── Helpers ──
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Render ──
function render() {
  const projectList = Object.values(projects);
  const total = projectList.reduce((sum, p) => sum + (p.amount || 0), 0);
  const pct = Math.min((total / TARGET) * 100, 100);
  const autoBoxes = Math.floor(total / 1000);

  // Progress
  document.getElementById('total-amount').textContent = '€' + total.toLocaleString('de-DE');
  document.getElementById('total-pct').textContent = Math.round(pct) + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // Stats
  document.getElementById('stat-projects').textContent = projectList.length;
  document.getElementById('stat-avg').textContent = projectList.length
    ? '€' + Math.round(total / projectList.length).toLocaleString('de-DE')
    : '€0';
  document.getElementById('stat-remaining').textContent = '€' + Math.max(0, TARGET - total).toLocaleString('de-DE');

  // Daily needed
  const end = new Date('2026-05-01T00:00:00+02:00');
  const now = new Date();
  const daysLeft = Math.max(1, Math.ceil((end - now) / 86400000));
  const remaining = Math.max(0, TARGET - total);
  document.getElementById('stat-daily').textContent = '€' + Math.round(remaining / daysLeft).toLocaleString('de-DE');

  // Velocity
  const velEl = document.getElementById('velocity');
  if (projectList.length > 0) {
    const daysPassed = Math.max(1, 30 - daysLeft + 1);
    const pace = total / daysPassed;
    const projected = pace * 30;
    velEl.innerHTML = `Pace: <span>€${Math.round(pace).toLocaleString('de-DE')}/Tag</span> → Projektion: <span>€${Math.round(projected).toLocaleString('de-DE')}</span>`;
  } else {
    velEl.innerHTML = '';
  }

  // Projects list
  const listEl = document.getElementById('projects-list');
  if (projectList.length === 0) {
    listEl.innerHTML = '<div class="projects__empty">Noch keine Projekte eingetragen.</div>';
  } else {
    listEl.innerHTML = projectList
      .sort((a, b) => (b.amount || 0) - (a.amount || 0))
      .map(p => `
        <div class="project-card">
          <div class="project-card__name">${escHtml(p.name)}</div>
          <div class="project-card__amount">€${(p.amount || 0).toLocaleString('de-DE')}</div>
          <button class="project-card__delete" data-id="${p.id}" title="Löschen">×</button>
        </div>
      `).join('');

    // Attach delete handlers
    listEl.querySelectorAll('.project-card__delete').forEach(btn => {
      btn.onclick = () => deleteProject(btn.dataset.id);
    });
  }

  // Checkboxes
  const boxes = document.querySelectorAll('.check-box');
  let checkedCount = 0;

  boxes.forEach((box, i) => {
    box.className = 'check-box';
    if (i < autoBoxes) {
      box.classList.add('check-box--auto');
      checkedCount++;
    } else if (manualChecks[i]) {
      box.classList.add('check-box--manual');
      checkedCount++;
    }
  });

  document.getElementById('checks-count').textContent = checkedCount + ' / ' + BOXES;
}

// ── Firebase Listeners ──
onValue(ref(db, 'projects'), snap => {
  projects = snap.val() || {};
  render();
});

onValue(ref(db, 'manualChecks'), snap => {
  manualChecks = snap.val() || {};
  render();
});

// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const el = document.getElementById('status');
  if (snap.val()) {
    el.className = 'status';
    el.querySelector('span').textContent = 'LIVE SYNC';
  } else {
    el.className = 'status status--offline';
    el.querySelector('span').textContent = 'OFFLINE';
  }
});

// ── Actions ──
window.addProject = function() {
  const nameInput = document.getElementById('input-name');
  const amountInput = document.getElementById('input-amount');
  const name = nameInput.value.trim();
  const amount = parseFloat(amountInput.value) || 0;

  if (!name || amount <= 0) return;

  const newRef = push(ref(db, 'projects'));
  set(newRef, {
    id: newRef.key,
    name,
    amount,
    createdAt: Date.now()
  });

  nameInput.value = '';
  amountInput.value = '';
  nameInput.focus();
}

function deleteProject(id) {
  if (confirm('Projekt wirklich löschen?')) {
    remove(ref(db, 'projects/' + id));
  }
}

function toggleManualCheck(index) {
  const total = Object.values(projects).reduce((sum, p) => sum + (p.amount || 0), 0);
  const autoBoxes = Math.floor(total / 1000);
  if (index < autoBoxes) return;

  const current = manualChecks[index] || false;
  set(ref(db, 'manualChecks/' + index), !current);
}

// Enter key support
document.getElementById('input-amount').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.addProject();
});
document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('input-amount').focus();
});
</script>
